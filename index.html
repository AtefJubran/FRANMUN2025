<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRANMUN 2026 | Conference</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root {
      --primary-dark: #001122;
      --secondary-blue: #002244;
      --accent-gold: #dfb72c;
      --accent-gold-hover: #fcd444;
      --text-light: #ffffff;
      --text-muted: #a0aec0;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top, var(--secondary-blue) 0%, var(--primary-dark) 100%);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Maintenance Overlay */
    #maintenanceOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #001122;
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    #maintenanceOverlay h1 {
      font-family: 'Cinzel', serif;
      color: var(--accent-gold);
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      color: var(--accent-gold);
      font-size: 3rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* Committees Navigation Tabs */
    .tabs-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 50px;
    }

    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: var(--text-light);
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .tab-btn.active, .tab-btn:hover {
      background: var(--accent-gold);
      color: var(--primary-dark);
      border-color: var(--accent-gold);
      box-shadow: 0 4px 15px rgba(223, 183, 44, 0.3);
    }

    /* Committee Content Display Area */
    .committee-display {
      background: rgba(0, 26, 51, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .comm-meta h2 {
      font-family: 'Cinzel', serif;
      color: var(--accent-gold);
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .comm-topic {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #cbd5e0;
      margin-bottom: 30px;
    }

    .btn-report {
      display: inline-block;
      background: transparent;
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      padding: 10px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .btn-report:hover {
      background: var(--accent-gold);
      color: var(--primary-dark);
    }

    /* Chairs Display Section */
    .chairs-section {
      margin-top: 50px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 40px;
    }

    .chairs-section h3 {
      font-family: 'Cinzel', serif;
      color: var(--text-light);
      font-size: 1.5rem;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .chairs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .chair-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 25px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .chair-card:hover {
      transform: translateY(-5px);
      border-color: rgba(223, 183, 44, 0.3);
    }

    .chair-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      margin: 0 auto 15px auto;
      border: 2px solid var(--accent-gold);
      object-fit: cover;
    }

    .chair-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
    }

    .chair-role {
      font-size: 0.85rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .chair-bio {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Top Secret / Coming Soon Badge */
    .secret-stamp {
      border: 3px dashed #e74c3c;
      color: #e74c3c;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 3px;
      transform: rotate(-3deg);
      margin: 30px 0;
    }
  </style>
</head>
<body>

  <!-- Maintenance Overlay Panel -->
  <div id="maintenanceOverlay">
    <h1>WEBSITE UNDER MAINTENANCE</h1>
    <p style="color: var(--text-muted);">We are currently updating our systems. Please check our official Instagram for updates.</p>
  </div>

  <div class="container">
    <header>
      <h1>FRANMUN 2026</h1>
      <p style="color: var(--text-muted);">Committees and Academic Leadership Profiles</p>
    </header>

    <!-- Navigation Tabs for Committees -->
    <div class="tabs-container" id="tabsContainer">
      <!-- Tabs built dynamically via JS -->
    </div>

    <!-- Main Dynamic Content Box -->
    <div class="committee-display" id="committeeDisplay">
      <!-- Committee data built dynamically via JS -->
    </div>
  </div>

  <script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBTMBi7k8XzwrNk5MERo7LXtApvhAid08E",
      authDomain: "franmun-f5498.firebaseapp.com",
      databaseURL: "https://franmun-f5498-default-rtdb.firebaseio.com",
      projectId: "franmun-f5498",
      storageBucket: "franmun-f5498.firebasestorage.app",
      messagingSenderId: "574017816071",
      appId: "1:574017816071:web:1968d9a793dec6a6cacca2",
      measurementId: "G-WRXCD54P71"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let serverData = {};
    let currentActiveTab = "UNWOMEN"; // القيمة الافتراضية عند التحميل

    // استدعاء البيانات من السيرفر عند تحميل الصفحة
    window.onload = function() {
      database.ref("homepage_data").on("value", (snapshot) => {
        if (snapshot.exists()) {
          serverData = snapshot.val();
          
          // 1. فحص وضع الصيانة أولاً
          if (serverData.maintenanceMode === true) {
            document.getElementById("maintenanceOverlay").style.display = "flex";
            return;
          } else {
            document.getElementById("maintenanceOverlay").style.display = "none";
          }

          // 2. بناء الأزرار واللجان
          buildCommitteeTabsNav();
          renderSelectedCommitteeContent(currentActiveTab);
        }
      });
    };

    // بناء قائمة التبويبات العلوية للجان
    function buildCommitteeTabsNav() {
      const container = document.getElementById("tabsContainer");
      if(!serverData.committees) return;

      let html = "";
      Object.keys(serverData.committees).forEach(key => {
        const isActive = (key === currentActiveTab) ? "active" : "";
        html += `<button class="tab-btn ${isActive}" onclick="switchCommitteeTab('${key}')">${key}</button>`;
      });
      container.innerHTML = html;
    }

    // الانتقال بين اللجان عند الضغط
    function switchCommitteeTab(key) {
      currentActiveTab = key;
      buildCommitteeTabsNav();
      renderSelectedCommitteeContent(key);
    }

    // عرض بيانات اللجنة المحددة والـ Chairs التابعين لها
    function renderSelectedCommitteeContent(key) {
      const displayArea = document.getElementById("committeeDisplay");
      const committee = serverData.committees ? serverData.committees[key] : null;

      if (!committee) {
        displayArea.innerHTML = "<p>No data available for this committee.</p>";
        return;
      }

      let html = `
        <div class="comm-meta">
          <h2>${key} Committee</h2>
          <p class="comm-topic">${committee.topics || 'Topic summary will be published soon.'}</p>
          ${committee.report ? `<a href="${committee.report}" target="_blank" class="btn-report">Download Research Report (PDF)</a>` : ''}
        </div>
      `;

      // فحص ختم السرية / إخفاء الـ Chairs
      if (committee.chairsComingSoon === true) {
        html += `
          <div style="text-align: center; margin-top: 40px;">
            <div class="secret-stamp">TOP SECRET</div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Chairs identities and allocations are locked until final deployment.</p>
          </div>
        `;
      } else {
        // بناء الجريد الخاص بالـ Chairs
        html += `
          <div class="chairs-section">
            <h3>Committee Board & Leadership</h3>
            <div class="chairs-grid" id="chairsGrid">
        `;

        // 🌟 التعديل السحري الذكي هنا لدمج الـ 5 تشيرز في الكرايسيس 🌟
        let allChairsList = [];

        // 1. إضافة الـ Chairs العاديين (سواء 3 في الكرايسيس أو أي عدد في اللجان التانية)
        if (committee.chairs && Array.isArray(committee.chairs)) {
          committee.chairs.forEach(c => {
            allChairsList.push({
              name: c.name,
              bio: c.bio,
              role: "Committee Chair"
            });
          });
        }

        // 2. فحص إذا كانت اللجنة هي CRISIS وهناك باكروم (تنين باكروم)، نقوم بدمجهم
        if (key === "CRISIS" && committee.backroom && Array.isArray(committee.backroom)) {
          committee.backroom.forEach(b => {
            allChairsList.push({
              name: b.name,
              bio: b.bio,
              role: "Backroom Chair" // تحديد مسمى وظيفي خاص بهم
            });
          });
        }

        // بناء كروت العرض للـ 5 تشيرز معاً داخل الصفحة
        if (allChairsList.length > 0) {
          allChairsList.forEach(chair => {
            html += `
              <div class="chair-card">
                <div class="chair-avatar"></div>
                <div class="chair-name">${chair.name || 'Name Unassigned'}</div>
                <div class="chair-role">${chair.role}</div>
                <p class="chair-bio">${chair.bio || 'Biography parameters pending authorization.'}</p>
              </div>
            `;
          });
        } else {
          html += `<p style="color: var(--text-muted);">No chairs assigned yet.</p>`;
        }

        html += `
            </div>
          </div>
        `;
      }

      displayArea.innerHTML = html;
    }
  </script>
</body>
</html>
