<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRANMUN | Backrooms Control Console</title>
  <style>
    :root {
      --bg-dark: #060d16;
      --panel-bg: #0b1523;
      --accent-gold: #dfb72c;
      --accent-gold-hover: #fcd444;
      --border-color: rgba(255,255,255,0.08);
      --text-light: #ffffff;
      --text-muted: #8a99ad;
      --btn-accept: #2ecc71;
      --btn-reject: #e74c3c;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 320px;
      background-color: var(--panel-bg);
      border-right: 2px solid var(--accent-gold);
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .sidebar h2 { font-size: 20px; color: var(--accent-gold); letter-spacing: 0.5px; }
    .main-workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar {
      background-color: var(--panel-bg);
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
    }
    .top-bar h1 { font-size: 22px; }
    .content-area { flex:1; padding: 30px; overflow-y: auto; display: flex; gap: 25px; }
    .column { flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .card {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 20px;
    }
    .card h3 { color: var(--accent-gold); margin-bottom: 15px; font-size: 16px; text-transform: uppercase;}
    .form-group { margin-bottom: 15px; }
    .form-group label { display:block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
    .form-group input, .form-group textarea, .form-group select {
      width:100%; padding: 10px; background: rgba(0,0,0,0.3); border:1px solid var(--border-color); border-radius: 5px; color:#fff; font-size:14px;
    }
    .form-group input:focus, .form-group textarea:focus { outline:none; border-color: var(--accent-gold); }
    .btn {
      width: 100%; padding: 12px; border:none; border-radius:5px; font-weight:700; cursor:pointer; font-size:14px; transition: 0.2s ease;
    }
    .btn-gold { background-color: var(--accent-gold); color: #000; }
    .btn-gold:hover { background-color: var(--accent-gold-hover); }
    .directive-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .dir-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .badge-pending { background: #f39c12; color: #fff; }
    .badge-accepted { background: var(--btn-accept); color: #fff; }
    .badge-rejected { background: var(--btn-reject); color: #fff; }
    .row-btns { display: flex; gap: 10px; margin-top: 10px; }
    .action-inline-btn { flex: 1; padding: 8px; border: none; border-radius: 4px; font-weight: bold; font-size: 12px; cursor: pointer; color: #fff; }
    .btn-inline-accept { background-color: var(--btn-accept); }
    .btn-inline-reject { background-color: var(--btn-reject); }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTMBi7k8XzwrNk5MERo7LXtApvhAid08E",
      authDomain: "franmun-f5498.firebaseapp.com",
      databaseURL: "https://franmun-f5498-default-rtdb.firebaseio.com",
      projectId: "franmun-f5498",
      storageBucket: "franmun-f5498.firebasestorage.app",
      messagingSenderId: "574017816071",
      appId: "1:574017816071:web:1968d9a793dec6a6cacca2",
      measurementId: "G-WRXCD54P71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.db = db;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbPush = push;
    window.dbOnValue = onValue;
    window.dbUpdate = update;
  </script>
</head>
<body>

  <div class="sidebar">
    <h2>FRANMUN Control</h2>
    
    <div class="card" style="padding: 15px; background: rgba(0,0,0,0.2);">
      <div class="form-group">
        <label>Room Universal Status</label>
        <select id="roomStatusSelect" onchange="updateRoomStatus()">
          <option value="Opened">Opened</option>
          <option value="Closed">Closed</option>
          <option value="Frozen">Frozen</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h3>Broadcast Crisis News</h3>
      <form onsubmit="broadcastUpdate(event)">
        <div class="form-group">
          <label>Timestamp / Time</label>
          <input type="text" id="updateTime" placeholder="e.g., 10:45 AM" required>
        </div>
        <div class="form-group">
          <label>Headline Title</label>
          <input type="text" id="updateTitle" placeholder="e.g., Border Clash Reported" required>
        </div>
        <div class="form-group">
          <label>Short Description</label>
          <textarea id="updateDesc" rows="4" placeholder="Type the breaking crisis details..." required></textarea>
        </div>
        <button type="submit" class="btn btn-gold">Publish News Bullet</button>
      </form>
    </div>
  </div>

  <div class="main-workspace">
    <div class="top-bar">
      <h1>Crisis Backrooms Executive Dashboard</h1>
      <div style="color: var(--accent-gold); font-weight: 600;">Secure Cloud Connection Live 🟢</div>
    </div>

    <div class="content-area">
      <div class="column">
        <h2 style="font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">📥 Incoming Directives Pipeline</h2>
        <div id="directivesPipeline" style="overflow-y: auto; flex: 1; max-height: calc(100vh - 160px);">
          </div>
      </div>
    </div>
  </div>

  <script>
    // الاستماع الفوري وإدارة جلب البيانات من السحاب
    function initFirebaseBackroom() {
      if (!window.db) {
        setTimeout(initFirebaseBackroom, 500);
        return;
      }

      // جلب حالة الغرفة الحالية وضبط خيار الـ Select
      window.dbOnValue(window.dbRef(window.db, 'room_status'), (snapshot) => {
        if(snapshot.exists()) {
          document.getElementById("roomStatusSelect").value = snapshot.val();
        }
      });

      // جلب جميع الدايركتفز المرسلة من الديليجتس وإظهارها فوراً لإعطاء قرار
      window.dbOnValue(window.dbRef(window.db, 'directives'), (snapshot) => {
        const pipeline = document.getElementById("directivesPipeline");
        pipeline.innerHTML = "";
        
        const data = snapshot.val();
        if(!data) {
          pipeline.innerHTML = `<p style="color: var(--text-muted); font-size:14px;">No directives in the secure pipeline yet.</p>`;
          return;
        }

        // تحويل الكائن إلى مصفوفة وعرض الأحدث في الأعلى
        Object.keys(data).reverse().forEach((key) => {
          const dir = data[key];
          const badgeClass = dir.status === 'Accepted' ? 'badge-accepted' : dir.status === 'Rejected' ? 'badge-rejected' : 'badge-pending';
          
          let actionSection = `
            <div class="form-group" style="margin-top:10px;">
              <label>Staff Feedback / Consequence</label>
              <input type="text" id="feedback_${key}" placeholder="Type backroom reaction..." value="${dir.feedback || ''}">
            </div>
            <div class="row-btns">
              <button class="action-inline-btn btn-inline-accept" onclick="processDirective('${key}', 'Accepted')">Accept</button>
              <button class="action-inline-btn btn-inline-reject" onclick="processDirective('${key}', 'Rejected')">Reject</button>
            </div>
          `;

          pipeline.innerHTML += `
            <div class="directive-item">
              <div class="dir-header">
                <span><strong>From:</strong> ${dir.sender} (${dir.type})</span>
                <span class="badge ${badgeClass}">${dir.status}</span>
              </div>
              <p style="font-size:14px; color:#e2e8f0; word-wrap:break-word;">${dir.content}</p>
              <div style="font-size:12px; color: var(--accent-gold); margin-top:5px;"><strong>Joint:</strong> ${dir.joint}</div>
              ${actionSection}
            </div>
          `;
        });
      });
    }

    window.addEventListener('DOMContentLoaded', initFirebaseBackroom);

    // تحديث حالة الغرفة على السيرفر
    function updateRoomStatus() {
      const status = document.getElementById("roomStatusSelect").value;
      if (window.db) {
        window.dbSet(window.dbRef(window.db, 'room_status'), status);
      }
    }

    // بث خبر أو تحديث جديد في السيرفر
    function broadcastUpdate(event) {
      event.preventDefault();
      const time = document.getElementById("updateTime").value;
      const title = document.getElementById("updateTitle").value;
      const desc = document.getElementById("updateDesc").value;

      const newUpdateRef = window.dbPush(window.dbRef(window.db, 'crisis_updates'));
      window.dbSet(newUpdateRef, { time, title, desc }).then(() => {
        alert("News Broadcasted Online!");
        document.getElementById("updateTime").value = "";
        document.getElementById("updateTitle").value = "";
        document.getElementById("updateDesc").value = "";
      });
    }

    // إرسال الـ Feedback والـ Decision للديليجت مباشرة عبر السحاب
    function processDirective(firebaseKey, decision) {
      const fbValue = document.getElementById(`feedback_${firebaseKey}`).value;
      
      const updates = {};
      updates[`/directives/${firebaseKey}/status`] = decision;
      updates[`/directives/${firebaseKey}/feedback`] = fbValue;

      window.dbUpdate(window.dbRef(window.db), updates).then(() => {
        alert(`Directive updated to [${decision}] successfully!`);
      });
    }
  </script>
</body>
</html>
