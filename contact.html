<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إرسال تحديثات مؤتمر FranMUN</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 150px; resize: vertical; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>إرسال إيميل جماعي للمشاركين</h2>
    <form action="/send_broadcast" method="POST">
        <label for="subject">عنوان الرسالة:</label>
        <input type="text" id="subject" name="subject" placeholder="مثلاً: تحديث هام لمؤتمر FranMUN" required>

        <label for="message">نص الرسالة:</label>
        <textarea id="message" name="message" placeholder="اكتب هنا التحديث الذي تريد إرساله للمشاركين..." required></textarea>

        <button type="submit">إرسال للجميع</button>
    </form>
</div>

</body>
</html>
