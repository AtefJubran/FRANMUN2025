<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FranMUN | Command & Broadcast Center</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.75);
            --border-color: rgba(48, 54, 61, 0.8);
            --accent-glow: #00ffcc;
            --accent-secondary: #7928ca;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(121, 40, 202, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header-badge {
            display: inline-block;
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-glow);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            font-weight: 600;
            font-size: 26px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        textarea {
            height: 160px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #00ffcc 0%, #00b4d8 100%);
            color: #0d1117;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 204, 0.5);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-badge">FranMUN Protocol</div>
    <h2>Broadcast Command Center</h2>
    <p class="subtitle">Deploy automated updates and alerts to all registered conference delegates.</p>
    
    <!-- Action points to your Google Apps Script web app URL -->
    <form action="YOUR_GOOGLE_APPS_SCRIPT_WEB_URL_HERE" method="POST">
        <label for="subject">Transmission Subject</label>
        <input type="text" id="subject" name="subject" placeholder="e.g., Urgent Update: Committee Session Rescheduling" required>

        <label for="message">Payload Content / Message</label>
        <textarea id="message" name="message" placeholder="Type your broadcast message or briefing text here..." required></textarea>

        <button type="submit">Initialize Broadcast</button>
    </form>
</div>

</body>
</html>
