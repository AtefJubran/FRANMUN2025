<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRANMUN | Crisis Suite</title>
  <style>
    :root {
      --primary-dark: #001122;    
      --secondary-blue: #002244;  
      --accent-gold: #dfb72c;     
      --accent-gold-hover: #fcd444;
      --card-bg: rgba(255, 255, 255, 0.04); 
      --card-border: rgba(255, 255, 255, 0.08);
      --text-light: #ffffff;
      --text-muted: #a0aec0;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at center, var(--secondary-blue) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-light);
      padding: 20px;
    }

    /* CONTAINER LOGIN */
    .login-container {
      background: rgba(0, 26, 51, 0.65);
      border: 2px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 30px;
      border-radius: 18px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      transition: var(--transition-smooth);
    }

    .login-container:hover {
      border-color: rgba(223, 183, 44, 0.3);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
    }

    .logo {
      max-width: 80px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px rgba(223, 183, 44, 0.3));
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: var(--transition-smooth);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent-gold);
      background: rgba(0, 0, 0, 0.5);
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-gold) 0%, #c59f23 100%);
      color: var(--primary-dark);
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: 0 8px 20px rgba(223, 183, 44, 0.15);
      margin-top: 10px;
    }

    .login-btn:hover {
      background: linear-gradient(135deg, var(--accent-gold-hover) 0%, var(--accent-gold) 100%);
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(223, 183, 44, 0.3);
    }

    /* DASHBOARD CONTENT (HIDDEN BY DEFAULT) */
    .dashboard-container {
      display: none;
      max-width: 800px;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 40px;
      border-radius: 14px;
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .dashboard-container h1 {
      color: var(--accent-gold);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="login-container" id="loginSuite">
    <img src="7d8c75e2-c20b-4770-aa29-71ab72b07f58-dnscaled.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/80'">
    <h2>Crisis Suite Login</h2>
    <p class="subtitle">Please enter your authorized delegate credentials</p>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="e.g., USA_Delegate" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="login-btn">Access Dashboard →</button>
    </form>
  </div>

  <div class="dashboard-container" id="dashboardSuite">
    <h1>Welcome to the Crisis Dashboard</h1>
    <p>مرحباً بك يا عاطف! هنا تظهر تفاصيل وأدوات لجنة الكرايسس الخاصة بك.</p>
    <p style="margin-top: 20px; color: var(--text-muted);">[ يمكنك تعديل هذا القسم وإضافة محتوى اللجنة هنا كما تشاء ]</p>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault(); // منع الصفحة من التحديث عند الضغط على الزر

      const userField = document.getElementById("username").value;
      const passField = document.getElementById("password").value;

      // البيانات المطلوبة التي اخترتها أنت
      const correctUser = "ATEF";
      const correctPass = "2009";

      if (userField === correctUser && passField === correctPass) {
        // إذا كانت البيانات صحيحة: إخفاء تسجيل الدخول وإظهار لوحة التحكم
        document.getElementById("loginSuite").style.display = "none";
        document.getElementById("dashboardSuite").style.display = "block";
      } else {
        // إذا كانت خاطئة
        alert("Wrong Username or Password! Please try again.");
      }
    }

    // حماية الصفحة من كبسة الماوس اليمين والاختصارات
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
      if (e.keyCode == 123) return false; // F12
      if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    };
  </script>
</body>
</html>
