<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRANMUN | Crisis Suite</title>
  <style>
    :root {
      --primary-dark: #000c18;    
      --secondary-blue: #001a33;  
      --accent-gold: #dfb72c;     
      --accent-gold-hover: #fcd444;
      --card-bg: rgba(255, 255, 255, 0.03); 
      --card-border: rgba(255, 255, 255, 0.08);
      --text-light: #ffffff;
      --text-muted: #a0aec0;
      --status-open: #2ecc71;
      --status-closed: #e74c3c;
      --status-frozen: #3498db;
      --status-revision: #e67e22;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, var(--secondary-blue) 0%, var(--primary-dark) 100%);
      background-attachment: fixed;
      color: var(--text-light);
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative; /* ضروري عشان تحديد موقع اللوجو بالخلفية */
    }

    /* تأثير اللوجو الكبير والباهت في منتصف الخلفية */
    /* تأثير اللوجو الدائري الكبير والباهت في منتصف الخلفية */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      /* تكبير الحجم (تمت زيادته ليغطي مساحة أكبر من الشاشة) */
      width: 80vw; 
      height: 80vw;
      max-width: 750px; 
      max-height: 750px;
      
      background-image: url('logo.jpeg.JPG');
      background-size: cover; /* لضمان ملء الدائرة بالكامل دون تشويه */
      background-repeat: no-repeat;
      background-position: center;
      
      /* جعل اللوجو دائرياً */
      border-radius: 50%; 
      
      opacity: 0.04; /* درجة البهتان (يمكنك زيادتها إلى 0.06 إذا رغبت بأن يكون أوضح قليلاً) */
      pointer-events: none; /* لمنع التداخل مع أزرار الصفحة */
      z-index: 0; /* خلف النصوص والعناصر */
    }
    /* إعطاء z-index لعناصر الصفحة عشان تطلع فوق اللوجو */
    .public-page { 
      flex: 1; 
      padding: 40px; 
      max-width: 900px; 
      margin: 0 auto; 
      transition: var(--transition-smooth); 
      position: relative;
      z-index: 1; 
    }
    
    header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--card-border); padding-bottom: 20px; margin-bottom: 30px; }
    header h1 { font-size: 28px; background: linear-gradient(120deg, #ffffff, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .status-board {
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px 30px;
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(5px); /* تأثير ضبابي خفيف خلف الكروت ليعطي جمالية مع اللوجو */
    }
    .status-info h3 { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .status-value { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-top: 5px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .status-open { color: var(--status-open); }
    .status-open .status-dot { background-color: var(--status-open); box-shadow: 0 0 12px var(--status-open); }
    .status-closed { color: var(--status-closed); }
    .status-closed .status-dot { background-color: var(--status-closed); box-shadow: 0 0 12px var(--status-closed); }
    .status-frozen { color: var(--status-frozen); }
    .status-frozen .status-dot { background-color: var(--status-frozen); box-shadow: 0 0 12px var(--status-frozen); }

    .crisis-updates h2, .search-reports h2 { color: var(--accent-gold); margin-bottom: 20px; font-size: 22px; }
    .timeline { position: relative; border-left: 2px solid var(--card-border); padding-left: 20px; margin-left: 10px; margin-bottom: 40px; }
    .timeline-item { position: relative; margin-bottom: 25px; background: rgba(255,255,255,0.01); padding: 15px; border-radius: 8px; border: 1px solid var(--card-border); backdrop-filter: blur(3px); }
    .timeline-item::before { content: ''; position: absolute; left: -27px; top: 20px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-gold); border: 2px solid var(--secondary-blue); }
    .time-badge { font-size: 12px; color: var(--accent-gold); font-weight: 600; }
    .timeline-title { font-size: 16px; font-weight: 700; margin: 4px 0; }
    .timeline-desc { color: #cbd5e0; font-size: 14px; }

    /* SEARCH REPORTS STYLES */
    .reports-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 15px; }
    .report-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 15px; border-radius: 10px; transition: var(--transition-smooth); backdrop-filter: blur(3px); }
    .report-card:hover { border-color: var(--accent-gold); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(223, 183, 44, 0.1); }
    .report-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .report-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    .report-link { display: inline-block; background: rgba(223, 183, 44, 0.1); color: var(--accent-gold); padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; text-decoration: none; transition: 0.2s; border: 1px solid transparent; }
    .report-link:hover { background: var(--accent-gold); color: var(--primary-dark); }

    .side-panel {
      width: 400px; background: rgba(0, 13, 26, 0.98); border-left: 2px solid var(--accent-gold); backdrop-filter: blur(20px);
      position: fixed; right: -400px; top: 0; height: 100%; z-index: 999; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
      transition: var(--transition-smooth); display: flex; flex-direction: column;
    }
    .side-panel.active { right: 0; }

    .panel-toggle-btn {
      background: var(--accent-gold); color: var(--primary-dark); font-weight: 700; padding: 12px 20px; border-radius: 8px 0 0 8px;
      cursor: pointer; position: fixed; right: 0; top: 40px; z-index: 1000; box-shadow: -4px 4px 15px rgba(223, 183, 44, 0.2); transition: var(--transition-smooth);
    }
    .side-panel.active + .panel-toggle-btn { right: 400px; background: var(--status-closed); color: #fff; }

    .panel-header { padding: 25px 20px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
    .panel-header h2 { color: var(--accent-gold); font-size: 20px; }
    .panel-body { padding: 20px; flex: 1; overflow-y: auto; }

    .panel-login-form { display: block; }
    .panel-login-form h3 { font-size: 15px; margin-bottom: 15px; color: #fff; }
    .private-dashboard { display: none; }
    .delegate-welcome { background: rgba(223, 183, 44, 0.08); border: 1px solid var(--accent-gold); padding: 12px; border-radius: 8px; font-weight: 600; color: var(--accent-gold); margin-bottom: 20px; text-align: center; }

    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--card-border); border-radius: 6px; color: #fff; font-size: 14px; transition: var(--transition-smooth);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-gold); }
    
    .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
    .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }

    .action-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent-gold), #c59f23); color: var(--primary-dark); border: none; border-radius: 6px; font-weight: 700; font-size: 15px; cursor: pointer; transition: var(--transition-smooth); margin-bottom: 10px; }
    .action-btn:hover { background: linear-gradient(135deg, var(--accent-gold-hover), var(--accent-gold)); transform: translateY(-1px); }

    .draft-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--card-border); border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; transition: var(--transition-smooth); margin-bottom: 15px; }
    .draft-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--accent-gold); }

    .logout-btn { background: transparent; border: 1px solid var(--status-closed); color: var(--status-closed); padding: 5px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .logout-btn:hover { background: var(--status-closed); color: #fff; }

    .feedback-box { background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); padding: 15px; border-radius: 8px; font-size: 13px; color: #e2e8f0; margin-bottom: 20px; max-height: 180px; overflow-y: auto; }
    .draft-badge { background: #f39c12; color: #000; padding: 2px 6px; font-size: 11px; font-weight: bold; border-radius: 4px; margin-left: 10px; display: none; }
    
    .revise-btn { background: var(--status-revision); color: #fff; padding: 5px 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; display: inline-block; }

    #jointDelegateSection { display: none; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, get, child } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTMBi7k8XzwrNk5MERo7LXtApvhAid08E",
      authDomain: "franmun-f5498.firebaseapp.com",
      databaseURL: "https://franmun-f5498-default-rtdb.firebaseio.com",
      projectId: "franmun-f5498",
      storageBucket: "franmun-f5498.firebasestorage.app",
      messagingSenderId: "574017816071",
      appId: "1:574017816071:web:1968d9a793dec6a6cacca2",
      measurementId: "G-WRXCD54P71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.db = db; window.dbRef = ref; window.dbOnValue = onValue; window.dbSet = set; window.dbPush = push; window.dbGet = get; window.dbChild = child;
  </script>
</head>
<body>

  <div class="public-page">
    <header>
      <div>
        <h1>Crisis Backrooms Workspace</h1>
        <p style="color: var(--text-muted); font-size: 14px;">FRANMUN Executive Suite</p>
      </div>
    </header>

    <div class="status-board">
      <div class="status-info">
        <h3>Backrooms Status</h3>
        <div class="status-value status-open" id="currentStatus">
          <span class="status-dot"></span> <span id="statusText">Opened</span>
        </div>
      </div>
      <div style="font-size: 13px; color: var(--text-muted); text-align: right;">Realtime connection active</div>
    </div>

    <div class="crisis-updates">
      <h2>📢 Live Crisis Timeline</h2>
      <div class="timeline" id="timelineContainer"></div>
    </div>

  <div class="panel-toggle-btn" onclick="toggleSidePanel()" id="toggleBtn">💻 Personal Space</div>
  
  <div class="side-panel" id="sidePanel">
    <div class="panel-header">
      <div>
        <h2>🔐 Personal Console</h2>
      </div>
      <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="triggerLogout()">Log Out</button>
    </div>

    <div class="panel-body">
      <div class="panel-login-form" id="panelLoginForm">
        <form onsubmit="handlePanelLogin(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="panelUser" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="panelPass" required>
          </div>
          <button type="submit" class="action-btn">Authorize Entry</button>
        </form>
      </div>

      <div class="private-dashboard" id="privateDashboard">
        <div class="delegate-welcome" id="delegateNameHeader">Welcome</div>
        
        <div style="margin-bottom: 20px;">
          <h4 style="color: var(--accent-gold); font-size: 13px; margin-bottom: 8px;">📥 Backroom Notifications & Feedback</h4>
          <div class="feedback-box" id="feedbackContent">No updates yet.</div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--card-border); margin-bottom: 20px;">

        <div>
          <h4 style="display:flex; justify-content:between; color: var(--accent-gold); font-size: 13px; margin-bottom: 12px;">
            <span>📤 Compose Directive</span>
            <span class="draft-badge" id="draftBadge">Draft Empty</span>
          </h4>
          <form onsubmit="submitDirective(event)">
            <div class="form-group">
              <label>Type</label>
              <select id="directiveType" required onchange="autoSaveDraft()">
                <option value="Private">Private Directive</option>
                <option value="Public">Public Directive</option>
                <option value="Communiqué">Communiqué</option>
                <option value="Press Release">Press Release</option>
              </select>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="isJoint" onchange="toggleJointSelection(); autoSaveDraft();">
              <label for="isJoint">Joint Directive</label>
            </div>

            <div class="form-group" id="jointDelegateSection">
              <label>Partners</label>
              <input type="text" id="partnerName" oninput="autoSaveDraft()">
            </div>

            <div class="form-group">
              <label>Content / Orders</label>
              <textarea id="directiveOrders" rows="5" oninput="autoSaveDraft()" required></textarea>
            </div>

            <button type="button" class="draft-btn" onclick="forceSaveDraft()">💾 Save as Draft</button>
            <button type="submit" class="action-btn">Transmit Online</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    let globalStatus = "Opened";
    let loggedInUser = null;
    let autoSaveTimeout = null;

    const localAccounts = { "ATEF": { password: "2009", name: "Admin / Atef Jubran" } };

    function initSync() {
      if (!window.db) { setTimeout(initSync, 300); return; }

      window.dbOnValue(window.dbRef(window.db, 'room_status'), (snap) => {
        globalStatus = snap.val() || "Opened";
        document.getElementById('currentStatus').className = "status-value " + (globalStatus==='Opened'?'status-open':globalStatus==='Closed'?'status-closed':'status-frozen');
        document.getElementById('statusText').innerText = globalStatus;
      });

      window.dbOnValue(window.dbRef(window.db, 'crisis_updates'), (snap) => {
        const container = document.getElementById('timelineContainer');
        let html = '';
        if(snap.exists()){
          Object.values(snap.val()).reverse().forEach(item => {
            html += `<div class="timeline-item">
              <span class="time-badge">${item.time}</span>
              <div class="timeline-title">${item.title}</div>
              <div class="timeline-desc">${item.desc}</div>
            </div>`;
          });
        }
        container.innerHTML = html || '<p>Simulation Active.</p>';
      });

      window.dbOnValue(window.dbRef(window.db, 'search_reports'), (snap) => {
        const reportsContainer = document.getElementById('reportsContainer');
        let html = '';
        if(snap.exists()){
          Object.values(snap.val()).reverse().forEach(report => {
            html += `
              <div class="report-card">
                <div class="report-title">📄 ${report.title}</div>
                <div class="report-meta">Published: ${report.date || 'Today'}</div>
                <a href="${report.url}" target="_blank" class="report-link">👁️ View Report</a>
              </div>`;
          });
          reportsContainer.innerHTML = html;
        } else {
          reportsContainer.innerHTML = '<p style="color: var(--text-muted);">No search reports published yet.</p>';
        }
      });

      window.dbOnValue(window.dbRef(window.db, 'directives'), () => { loadDelegateFeedback(); });
    }
    window.addEventListener('DOMContentLoaded', initSync);

    function toggleSidePanel() {
      const p = document.getElementById("sidePanel");
      p.classList.toggle("active");
      document.getElementById("toggleBtn").innerText = p.classList.contains("active") ? "✖ Close" : "💻 Personal Space";
    }

    function handlePanelLogin(event) {
      event.preventDefault();
      const user = document.getElementById("panelUser").value.trim();
      const pass = document.getElementById("panelPass").value;

      if(localAccounts[user] && localAccounts[user].password === pass) {
        loginSuccess(user, localAccounts[user].name); return;
      }

      window.dbGet(window.dbChild(window.dbRef(window.db), `custom_accounts/${user}`)).then((snap) => {
        if(snap.exists() && snap.val().password === pass) {
          loginSuccess(user, snap.val().name);
        } else { alert("Access Denied."); }
      });
    }

    function loginSuccess(user, name) {
      loggedInUser = user;
      document.getElementById("panelLoginForm").style.display = "none";
      document.getElementById("privateDashboard").style.display = "block";
      document.getElementById("logoutBtn").style.display = "block";
      document.getElementById("delegateNameHeader").innerText = name;
      loadDelegateFeedback();
      loadSavedDraft();
    }

    function triggerLogout() {
      loggedInUser = null;
      document.getElementById("panelLoginForm").style.display = "block";
      document.getElementById("privateDashboard").style.display = "none";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("directiveOrders").value = "";
      document.getElementById("draftBadge").style.display = "none";
    }

    function loadDelegateFeedback() {
      if (!loggedInUser || !window.db) return;
      window.dbOnValue(window.dbRef(window.db, 'directives'), (snap) => {
        const box = document.getElementById("feedbackContent");
        box.innerHTML = "No directives sent yet.";
        if(snap.exists()) {
          const arr = Object.values(snap.val()).reverse();
          const last = arr.find(d => d.sender === loggedInUser);
          if(last) {
            let badge = last.status === 'Accepted' ? '🟢 Accepted' : last.status === 'Rejected' ? '🔴 Rejected' : last.status === 'Revision' ? '🟠 Revision Needed' : '⏳ Pending';
            let html = `<strong>Latest Status: ${badge}</strong><br>Feedback: ${last.feedback || 'None'}`;
            if(last.status === 'Revision') {
              html += `<br><button class="revise-btn" onclick="prepareRevision('${btoa(encodeURIComponent(last.content))}')">✏️ Revise & Resubmit</button>`;
            }
            box.innerHTML = html;
          }
        }
      });
    }

    function prepareRevision(encodedContent) {
      const originalContent = decodeURIComponent(atob(encodedContent));
      document.getElementById("directiveOrders").value = originalContent;
      alert("Original content loaded back into the form. Please modify and hit Transmit again!");
    }

    function autoSaveDraft() {
      if(!loggedInUser) return;
      document.getElementById("draftBadge").style.display = "inline";
      document.getElementById("draftBadge").innerText = "Typing...";
      clearTimeout(autoSaveTimeout);
      autoSaveTimeout = setTimeout(forceSaveDraft, 1000);
    }

    function forceSaveDraft() {
      if(!loggedInUser) return;
      window.dbSet(window.dbRef(window.db, `drafts/${loggedInUser}`), {
        type: document.getElementById("directiveType").value,
        isJoint: document.getElementById("isJoint").checked,
        partner: document.getElementById("partnerName").value,
        orders: document.getElementById("directiveOrders").value
      }).then(() => {
        document.getElementById("draftBadge").style.display = "inline";
        document.getElementById("draftBadge").innerText = "Cloud Draft Saved";
      });
    }

    function loadSavedDraft() {
      window.dbGet(window.dbChild(window.dbRef(window.db), `drafts/${loggedInUser}`)).then(snap => {
        if(snap.exists()) {
          const d = snap.val();
          document.getElementById("directiveType").value = d.type;
          document.getElementById("isJoint").checked = d.isJoint;
          toggleJointSelection();
          document.getElementById("partnerName").value = d.partner;
          document.getElementById("directiveOrders").value = d.orders;
          document.getElementById("draftBadge").style.display = "inline";
          document.getElementById("draftBadge").innerText = "Draft Loaded";
        }
      });
    }

    function toggleJointSelection() {
      document.getElementById("jointDelegateSection").style.display = document.getElementById("isJoint").checked ? "block" : "none";
    }

    function submitDirective(e) {
      e.preventDefault();
      if(globalStatus === 'Frozen' || globalStatus === 'Closed') { alert("Room is closed/frozen."); return; }
      
      const newRef = window.dbPush(window.dbRef(window.db, 'directives'));
      window.dbSet(newRef, {
        firebaseKey: newRef.key,
        sender: loggedInUser,
        type: document.getElementById("directiveType").value,
        joint: document.getElementById("isJoint").checked ? `Yes (${document.getElementById("partnerName").value})` : "No",
        content: document.getElementById("directiveOrders").value,
        status: "Pending",
        feedback: ""
      }).then(() => {
        alert("Transmitted!");
        window.dbSet(window.dbRef(window.db, `drafts/${loggedInUser}`), null);
        document.getElementById("directiveOrders").value = "";
        document.getElementById("draftBadge").style.display = "none";
      });
    }
  </script>
</body>
</html>
