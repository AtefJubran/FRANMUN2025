<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRANMUN | Chairs Portal</title>
  <style>
    /* --- DESIGN SYSTEM FOR PROJECTOR VISIBILITY (DARK MODE) --- */
    :root {
      --bg-dark: #0a1128;
      --card-bg: #111a36;
      --accent-gold: #dfb72c;
      --text-light: #ffffff;
      --text-muted: #a0aec0;
      --btn-green: #2ecc71;
      --btn-red: #e74c3c;
      --btn-blue: #3498db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #112244 0%, var(--bg-dark) 100%);
      background-attachment: fixed;
      color: var(--text-light);
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }

    /* تأثير اللوجو الشفاف في الخلفية بثبات كامل */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      height: 70vw;
      max-width: 600px;
      max-height: 600px;
      background-image: url('logo.jpeg.JPG');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      border-radius: 50%;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    /* --- LOGIN SCREEN INTERFACE --- */
    .login-container {
      position: relative;
      z-index: 10;
      max-width: 420px;
      margin: 100px auto;
      background: var(--card-bg);
      border: 2px solid var(--accent-gold);
      border-radius: 12px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0,0,0,0.6);
    }

    .login-container h2 {
      color: var(--accent-gold);
      margin-bottom: 25px;
    }

    .login-form input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px;
      color: white;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 15px;
    }

    .login-form input:focus {
      border-color: var(--accent-gold);
      outline: none;
    }

    .error-msg {
      color: var(--btn-red);
      font-size: 14px;
      margin-bottom: 15px;
      display: none;
    }

    /* --- MAIN DASHBOARD INTERFACE (HIDDEN BY DEFAULT) --- */
    .dashboard-container {
      display: none; /* تظهر بعد التسجيل الناجح */
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--accent-gold);
      padding-bottom: 15px;
    }

    header h1 {
      color: var(--accent-gold);
      font-size: 34px;
      letter-spacing: 1px;
    }

    /* --- GRID LAYOUT --- */
    .grid-layout {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 25px;
    }

    @media (max-width: 950px) {
      .grid-layout {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .panel h2 {
      color: var(--accent-gold);
      font-size: 20px;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
    }

    /* --- DUAL TIMERS CONTROL SYSTEM --- */
    .timers-wrapper {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .timers-wrapper {
        grid-template-columns: 1fr;
      }
    }

    .timer-card {
      background: #0d1730;
      border: 2px solid var(--accent-gold);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .timer-display {
      font-size: 75px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: var(--text-light);
      margin: 5px 0;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
    }

    .timer-display.danger {
      color: var(--btn-red);
      animation: blink 1s infinite;
    }

    @keyframes blink { 50% { opacity: 0.5; } }

    .timer-setup {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .timer-setup input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px;
      border-radius: 4px;
      width: 80px;
      text-align: center;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 13px;
    }

    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn-start { background: var(--btn-green); color: white; }
    .btn-pause { background: var(--btn-blue); color: white; }
    .btn-reset { background: var(--btn-red); color: white; }

    /* --- ROLL CALL & FAST ADD --- */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .input-group input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 10px;
      color: white;
    }

    .rollcall-list {
      max-height: 400px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      padding: 5px;
    }

    .country-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .country-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .country-name {
      font-size: 15px;
      font-weight: 500;
    }

    .btn-fast-add {
      background: rgba(223, 183, 44, 0.12);
      border: 1px dashed var(--accent-gold);
      color: var(--accent-gold);
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      width: fit-content;
    }

    .btn-fast-add:hover {
      background: var(--accent-gold);
      color: #000;
    }

    .status-badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 5px;
      display: inline-block;
    }

    .status-absent { background: #555; color: #ccc; }
    .status-present { background: #2980b9; color: white; }
    .status-voting { background: #27ae60; color: white; }

    .btn-remove {
      background: transparent;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 16px;
    }

    /* --- SPEAKERS LIST SYSTEM --- */
    .speakers-queue {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      min-height: 250px;
      padding: 10px;
      margin-bottom: 15px;
    }

    .speaker-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 8px;
      padding: 12px 15px;
      border-radius: 6px;
      border-left: 4px solid var(--accent-gold);
    }

    .speaker-item:first-child {
      background: rgba(223, 183, 44, 0.15);
      border-left: 4px solid #fff;
    }

    .speaker-index {
      font-weight: bold;
      color: var(--accent-gold);
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <div class="login-container" id="loginBox">
    <h2>FRANMUN Chairs Login</h2>
    <div class="login-form">
      <input type="text" id="usernameInput" placeholder="Username">
      <input type="password" id="passwordInput" placeholder="Password">
      <div class="error-msg" id="loginError">Invalid Username or Password!</div>
      <button class="btn btn-gold" style="width: 100%; padding: 12px;" onclick="handleLogin()">Login to Dashboard</button>
    </div>
  </div>

  <div class="dashboard-container" id="mainDashboard">
    <header>
      <h1 id="committeeHeaderTitle">FRANMUN | Committee Dashboard</h1>
    </header>

    <div class="grid-layout">
      
      <div class="timers-wrapper">
        
        <div class="timer-card">
          <h2 style="font-size: 16px; margin-bottom: 10px;">Total Motion Time</h2>
          <div class="timer-setup">
            <label>Minutes:</label>
            <input type="number" id="motionMinutesInput" value="10" min="1">
          </div>
          <div class="timer-display" id="motionClock">10:00</div>
          <div style="display: flex; justify-content: center; gap: 8px;">
            <button class="btn btn-start" onclick="startMotionTimer()">Start</button>
            <button class="btn btn-pause" onclick="pauseMotionTimer()">Pause</button>
            <button class="btn btn-reset" onclick="resetMotionTimer()">Reset</button>
          </div>
        </div>

        <div class="timer-card">
          <h2 style="font-size: 16px; margin-bottom: 10px;">Individual Speaker Time</h2>
          <div class="timer-setup">
            <label>Seconds:</label>
            <input type="number" id="speakerSecondsInput" value="60" min="1">
          </div>
          <div class="timer-display" id="speakerClock">01:00</div>
          <div style="display: flex; justify-content: center; gap: 8px;">
            <button class="btn btn-start" onclick="startSpeakerTimer()">Start</button>
            <button class="btn btn-pause" onclick="pauseSpeakerTimer()">Pause</button>
            <button class="btn btn-reset" onclick="resetSpeakerTimer()">Reset</button>
          </div>
        </div>

      </div>

      <div class="panel">
        <h2>Roll Call & Countries Base</h2>
        <div class="input-group">
          <input type="text" id="countryInput" placeholder="Add custom country...">
          <button class="btn btn-start" onclick="addCountry()">Add</button>
        </div>
        <div class="rollcall-list" id="rollcallContainer">
          </div>
      </div>

      <div class="panel">
        <h2>Speakers List Management</h2>
        <div class="speakers-queue" id="speakersContainer">
          </div>
        
        <div style="display: flex; gap: 10px;">
          <button class="btn btn-reset" style="width: 100%;" onclick="clearFinishedSpeaker()">Remove Current Speaker</button>
          <button class="btn btn-pause" style="width: 100%; background-color: #7f8c8d;" onclick="clearAllSpeakers()">Clear All</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- DATABASE ACCOUNTS CONFIGURATION ---
    const committeeAccounts = {
      "unwomen_chair": { pass: "women2026", name: "FRANMUN | UNWOMEN" },
      "unhrc_chair": { pass: "hrc2026", name: "FRANMUN | UNHRC" },
      "disec_chair": { pass: "disec2026", name: "FRANMUN | DISEC" },
      "who_chair": { pass: "who2026", name: "FRANMUN | WHO" },
      "unhsc_chair": { pass: "hsc2026", name: "FRANMUN | UNHSC" },
      "crisis_chair": { pass: "crisis2026", name: "FRANMUN | CRISIS", isCrisis: true }
    };

    let currentCommittee = null;

    // --- COUNTRIES INITIAL VALUES ---
    let countries = [
      { name: "United States", status: "Present" },
      { name: "United Kingdom", status: "Present" },
      { name: "France", status: "Present" },
      { name: "Saudi Arabia", status: "Absent" },
      { name: "Palestine", status: "Present" },
      { name: "Egypt", status: "Present" },
      { name: "China", status: "Absent" }
    ];

    let speakersQueue = [];

    // --- TIMERS VARIABLES ---
    let motionCountdown;
    let motionSeconds = 600; 
    let motionRunning = false;

    let speakerCountdown;
    let speakerSeconds = 60;
    let speakerRunning = false;

    /* ================= AUTHENTICATION SYSTEM ================= */
    function handleLogin() {
      const user = document.getElementById("usernameInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      const error = document.getElementById("loginError");

      if (committeeAccounts[user] && committeeAccounts[user].pass === pass) {
        currentCommittee = committeeAccounts[user];
        
        // إخفاء الـ Login وإظهار الـ Dashboard
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainDashboard").style.display = "block";
        
        // تعديل هيدر الصفحة باسم اللجنة فوراً
        document.getElementById("committeeHeaderTitle").innerText = currentCommittee.name;
        
        // تحديث وعرض البيانات بناءً على شروط اللجنة المفتوحة
        renderRollCall();
        renderSpeakers();
        resetMotionTimer();
        resetSpeakerTimer();
      } else {
        error.style.display = "block";
      }
    }

    /* ================= ROLL CALL SYSTEM ================= */
    function renderRollCall() {
      const container = document.getElementById("rollcallContainer");
      container.innerHTML = "";
      
      countries.sort((a,b) => a.name.localeCompare(b.name)).forEach((country, index) => {
        let badgeClass = "status-absent";
        if(country.status === "Present") badgeClass = "status-present";
        if(country.status === "Present & Voting") badgeClass = "status-voting";

        // تقنية الـ Fast-Add: إضافة زر الإضافة السريعة للقائمة فقط إذا كانت الدولة حاضرة
        const fastAddButton = country.status !== "Absent" 
          ? `<button class="btn-fast-add" onclick="fastAddSpeaker('${country.name}')">+ Add to List</button>` 
          : '';

        container.innerHTML += `
          <div class="country-row">
            <div class="country-info">
              <span class="country-name">${country.name}</span>
              ${fastAddButton}
            </div>
            <div>
              <span class="status-badge ${badgeClass}" onclick="toggleStatus(${index})">${country.status}</span>
              <button class="btn-remove" onclick="removeCountry(${index})">×</button>
            </div>
          </div>
        `;
      });
    }

    function addCountry() {
      const input = document.getElementById("countryInput");
      const name = input.value.trim();
      if(name) {
        countries.push({ name: name, status: "Present" });
        input.value = "";
        renderRollCall();
      }
    }

    function removeCountry(index) {
      countries.splice(index, 1);
      renderRollCall();
    }

    function toggleStatus(index) {
      const current = countries[index].status;
      
      // فحص إذا كانت اللجنة الحالية هي الـ Crisis لإلغاء الـ Present & Voting تلقائياً
      if (currentCommittee && currentCommittee.isCrisis) {
        countries[index].status = (current === "Absent") ? "Present" : "Absent";
      } else {
        if(current === "Absent") countries[index].status = "Present";
        else if(current === "Present") countries[index].status = "Present & Voting";
        else countries[index].status = "Absent";
      }
      renderRollCall();
    }

    /* ================= FAST SPEAKERS ADD TECHNIQUE ================= */
    function fastAddSpeaker(countryName) {
      // منع تكرار نفس الدولة المتحدثة مباشرة وراء بعضها لتسهيل العمل
      speakersQueue.push(countryName);
      renderSpeakers();
    }

    function renderSpeakers() {
      const container = document.getElementById("speakersContainer");
      container.innerHTML = "";

      if(speakersQueue.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding-top:90px;">No countries in Speaking List.</div>';
        return;
      }

      speakersQueue.forEach((speaker, index) => {
        const label = index === 0 ? " [Speaking Now]" : "";
        container.innerHTML += `
          <div class="speaker-item">
            <div>
              <span class="speaker-index">#${index + 1}</span>
              <strong>${speaker}</strong> ${label}
            </div>
            <button class="btn-remove" onclick="removeSpecificSpeaker(${index})">×</button>
          </div>
        `;
      });
    }

    function removeSpecificSpeaker(index) {
      speakersQueue.splice(index, 1);
      renderSpeakers();
    }

    function clearFinishedSpeaker() {
      if(speakersQueue.length > 0) {
        speakersQueue.shift();
        renderSpeakers();
        resetSpeakerTimer(); // تصفير عداد المتحدث الفردي تلقائياً عند الانتقال للتالي
      }
    }

    function clearAllSpeakers() {
      speakersQueue = [];
      renderSpeakers();
    }

    /* ================= SYSTEM DUAL TIMERS ENGINES ================= */
    
    // 1. إدارة تايمر الموشن الكلي (بالدقائق)
    function updateMotionDisplay() {
      const mins = Math.floor(motionSeconds / 60);
      const secs = motionSeconds % 60;
      const display = document.getElementById("motionClock");
      display.innerText = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
      display.className = (motionSeconds === 0) ? "timer-display danger" : "timer-display";
    }

    function startMotionTimer() {
      if (motionRunning) return;
      motionRunning = true;
      motionCountdown = setInterval(() => {
        if(motionSeconds > 0) {
          motionSeconds--;
          updateMotionDisplay();
        } else {
          clearInterval(motionCountdown);
          motionRunning = false;
        }
      }, 1000);
    }

    function pauseMotionTimer() {
      clearInterval(motionCountdown);
      motionRunning = false;
    }

    function resetMotionTimer() {
      clearInterval(motionCountdown);
      motionRunning = false;
      const inputVal = parseInt(document.getElementById("motionMinutesInput").value);
      motionSeconds = !isNaN(inputVal) && inputVal > 0 ? inputVal * 60 : 600;
      updateMotionDisplay();
    }

    // 2. إدارة تايمر المتحدث الفردي (بالثواني)
    function updateSpeakerDisplay() {
      const mins = Math.floor(speakerSeconds / 60);
      const secs = speakerSeconds % 60;
      const display = document.getElementById("speakerClock");
      display.innerText = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
      display.className = (speakerSeconds === 0) ? "timer-display danger" : "timer-display";
    }

    function startSpeakerTimer() {
      if (speakerRunning) return;
      speakerRunning = true;
      speakerCountdown = setInterval(() => {
        if(speakerSeconds > 0) {
          speakerSeconds--;
          updateSpeakerDisplay();
        } else {
          clearInterval(speakerCountdown);
          speakerRunning = false;
        }
      }, 1000);
    }

    function pauseSpeakerTimer() {
      clearInterval(speakerCountdown);
      speakerRunning = false;
    }

    function resetSpeakerTimer() {
      clearInterval(speakerCountdown);
      speakerRunning = false;
      const inputVal = parseInt(document.getElementById("speakerSecondsInput").value);
      speakerSeconds = !isNaN(inputVal) && inputVal > 0 ? inputVal : 60;
      updateSpeakerDisplay();
    }
  </script>
</body>
</html>
